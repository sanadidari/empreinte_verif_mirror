# DOCS_MANIFEST.yaml — Military Manifest v2.0
manifest_version: 2.0
project: empreinte_verif

repo_private: https://github.com/sanadidari/empreinte_verif
repo_mirror:  https://github.com/sanadidari/empreinte_verif_mirror

root_docs_path: /docs

watch_files:
  - AGENT_START.md
  - NEXT_ACTION.md
  - STATE_PROJECT.md
  - TASKS.md
  - AGENT_PROTOCOL.md
  - NEW_AGENT_ONBOARDING.md
  - SUPERVISOR_REPORT.md
  - GOVERNOR_SPEC.md

scan_order:
  - load_manifest
  - load_agent_start
  - load_onboarding
  - load_governor
  - load_supervisor
  - load_next_action
  - load_state_project
  - load_tasks
  - index_other_docs

file_patterns:
  docs: "*.md"
  code:
    - "pubspec.yaml"
    - "lib/**"
    - "web/**"
    - "android/**"
    - "ios/**"

scan_mode: strict
scan_interval_minutes: 0
auto_sync: true

notes: |
  NEXT_ACTION.md est bloquant.
  SUPERVISOR_REPORT.md doit être mis à jour par agents.
  Governor contrôle les limites système.
